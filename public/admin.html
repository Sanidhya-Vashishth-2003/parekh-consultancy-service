<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Parekh Consultancy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary-teal': '#0d6e6e',
            'dark-emerald': '#0a4f4f',
            'gold-accent': '#c8a84e',
            'light-gray': '#f8f9fa',
            'dark-text': '#1a202c',
          },
          fontFamily: {
            'headline': ['Outfit', 'sans-serif'],
            'body': ['Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 font-body text-gray-800 h-screen overflow-hidden flex">

  <!-- ADMIN LOGIN (Shown if not logged in or not admin) -->
  <div id="admin-login-screen" class="fixed inset-0 bg-gray-900 z-50 flex items-center justify-center hidden">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
      <span class="material-symbols-outlined text-5xl text-primary-teal mb-4">admin_panel_settings</span>
      <h2 class="text-2xl font-bold font-headline mb-6 text-dark-text">Admin Login</h2>
      <div class="space-y-4 text-left">
        <div>
          <label class="block text-sm font-medium text-gray-700">Admin Email</label>
          <input type="email" id="admin-email" class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-teal">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Password</label>
          <input type="password" id="admin-pwd" class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-teal">
        </div>
        <button onclick="adminLogin()" class="w-full bg-primary-teal text-white font-bold py-2 rounded-lg hover:bg-dark-emerald transition-colors">Login to Dashboard</button>
      </div>
      <p id="admin-error" class="text-red-500 text-sm mt-4 hidden"></p>
    </div>
  </div>

  <!-- SIDEBAR -->
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col hidden" id="admin-sidebar">
    <div class="p-6 border-b border-gray-200">
      <h2 class="text-2xl font-headline font-bold text-primary-teal">Admin Panel</h2>
    </div>
    <nav class="flex-1 p-4 space-y-2">
      <button onclick="showTab('dashboard')" class="tab-btn w-full flex items-center gap-3 px-4 py-3 bg-primary-teal/10 text-primary-teal font-bold rounded-lg text-left">
        <span class="material-symbols-outlined text-lg">dashboard</span> Dashboard
      </button>
      <button onclick="showTab('appointments')" class="tab-btn w-full flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 font-bold rounded-lg text-left">
        <span class="material-symbols-outlined text-lg">calendar_month</span> Appointments
      </button>
      <button onclick="showTab('users')" class="tab-btn w-full flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 font-bold rounded-lg text-left">
        <span class="material-symbols-outlined text-lg">group</span> Users
      </button>
      <button onclick="showTab('blogs')" class="tab-btn w-full flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 font-bold rounded-lg text-left">
        <span class="material-symbols-outlined text-lg">article</span> Add Blog Post
      </button>
      <button onclick="showTab('documents')" class="tab-btn w-full flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 font-bold rounded-lg text-left">
        <span class="material-symbols-outlined text-lg">folder</span> Client Documents
      </button>
    </nav>
    <div class="p-4 border-t border-gray-200">
      <button onclick="adminLogout()" class="w-full flex items-center gap-2 text-red-500 hover:bg-red-50 px-4 py-2 rounded-lg font-bold">
        <span class="material-symbols-outlined text-lg">logout</span> Logout
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 overflow-y-auto p-8 hidden" id="admin-main">
    
    <!-- Dashboard Tab -->
    <div id="tab-dashboard" class="tab-content">
      <h1 class="text-3xl font-headline font-bold mb-8">Overview</h1>
      <div class="grid grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
          <div>
            <p class="text-gray-500 font-bold text-sm">Total Users</p>
            <h3 class="text-4xl font-headline font-bold text-primary-teal" id="stat-users">0</h3>
          </div>
          <div class="w-12 h-12 bg-primary-teal/10 rounded-full flex items-center justify-center text-primary-teal"><span class="material-symbols-outlined">group</span></div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
          <div>
            <p class="text-gray-500 font-bold text-sm">Appointments</p>
            <h3 class="text-4xl font-headline font-bold text-primary-teal" id="stat-apps">0</h3>
          </div>
          <div class="w-12 h-12 bg-primary-teal/10 rounded-full flex items-center justify-center text-primary-teal"><span class="material-symbols-outlined">calendar_month</span></div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
          <div>
            <p class="text-gray-500 font-bold text-sm">Reviews</p>
            <h3 class="text-4xl font-headline font-bold text-primary-teal" id="stat-reviews">0</h3>
          </div>
          <div class="w-12 h-12 bg-primary-teal/10 rounded-full flex items-center justify-center text-primary-teal"><span class="material-symbols-outlined">star</span></div>
        </div>
      </div>
    </div>

    <!-- Appointments Tab -->
    <div id="tab-appointments" class="tab-content hidden">
      <h1 class="text-3xl font-headline font-bold mb-8">Appointments</h1>
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-50 text-gray-600 text-sm border-b border-gray-200">
              <th class="p-4">Name</th>
              <th class="p-4">Contact</th>
              <th class="p-4">Date/Time</th>
              <th class="p-4">Service</th>
              <th class="p-4">Message</th>
            </tr>
          </thead>
          <tbody id="app-table-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Users Tab -->
    <div id="tab-users" class="tab-content hidden">
      <h1 class="text-3xl font-headline font-bold mb-8">Registered Users</h1>
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-50 text-gray-600 text-sm border-b border-gray-200">
              <th class="p-4">ID</th>
              <th class="p-4">Name</th>
              <th class="p-4">Email</th>
            </tr>
          </thead>
          <tbody id="user-table-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Documents Tab -->
    <div id="tab-documents" class="tab-content hidden">
      <h1 class="text-3xl font-headline font-bold mb-8">Client Documents</h1>
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-50 text-gray-600 text-sm border-b border-gray-200">
              <th class="p-4">File</th>
              <th class="p-4">Client</th>
              <th class="p-4">Upload Date</th>
              <th class="p-4">Status</th>
              <th class="p-4">Actions</th>
            </tr>
          </thead>
          <tbody id="doc-table-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Blogs Tab -->
    <div id="tab-blogs" class="tab-content hidden">
      <h1 class="text-3xl font-headline font-bold mb-8">Add New Blog Post</h1>
      <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 max-w-2xl">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-bold mb-1">Title</label>
            <input type="text" id="blog-title" class="w-full border p-2 rounded focus:outline-none focus:border-primary-teal">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">Excerpt (Short Summary)</label>
            <input type="text" id="blog-excerpt" class="w-full border p-2 rounded focus:outline-none focus:border-primary-teal">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">Content (Markdown supported in future)</label>
            <textarea id="blog-content" rows="6" class="w-full border p-2 rounded focus:outline-none focus:border-primary-teal"></textarea>
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">Image URL (Optional)</label>
            <input type="text" id="blog-image" class="w-full border p-2 rounded focus:outline-none focus:border-primary-teal">
          </div>
          <button onclick="submitBlog()" class="bg-primary-teal text-white font-bold py-2 px-6 rounded hover:bg-dark-emerald transition-colors">Publish Post</button>
        </div>
      </div>
    </div>

  </main>

  <script>
    let token = localStorage.getItem('auth_token');
    let user = JSON.parse(localStorage.getItem('auth_user') || 'null');

    function checkAuth() {
      if (!token || !user || !user.isAdmin) {
        document.getElementById('admin-login-screen').classList.remove('hidden');
        document.getElementById('admin-sidebar').classList.add('hidden');
        document.getElementById('admin-main').classList.add('hidden');
      } else {
        document.getElementById('admin-login-screen').classList.add('hidden');
        document.getElementById('admin-sidebar').classList.remove('hidden');
        document.getElementById('admin-main').classList.remove('hidden');
        loadDashboardData();
      }
    }
    
    checkAuth();

    async function adminLogin() {
      const email = document.getElementById('admin-email').value;
      const password = document.getElementById('admin-pwd').value;
      const errEl = document.getElementById('admin-error');
      
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email, password})
        });
        const data = await res.json();
        if(!res.ok) {
          errEl.textContent = data.error;
          errEl.classList.remove('hidden');
          return;
        }
        if(!data.user.isAdmin) {
          errEl.textContent = "Access Denied. You are not an admin.";
          errEl.classList.remove('hidden');
          return;
        }
        
        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('auth_user', JSON.stringify(data.user));
        token = data.token;
        user = data.user;
        checkAuth();
      } catch(e) {
        errEl.textContent = "Network error";
        errEl.classList.remove('hidden');
      }
    }

    function adminLogout() {
      localStorage.removeItem('auth_token');
      localStorage.removeItem('auth_user');
      token = null;
      user = null;
      checkAuth();
    }

    function showTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById('tab-' + tabId).classList.remove('hidden');

      // Update sidebar styling
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('bg-primary-teal/10', 'text-primary-teal');
        btn.classList.add('text-gray-600', 'hover:bg-gray-100');
      });
      event.currentTarget.classList.add('bg-primary-teal/10', 'text-primary-teal');
      event.currentTarget.classList.remove('text-gray-600', 'hover:bg-gray-100');
    }

    async function fetchWithAuth(url, options = {}) {
      if(!options.headers) options.headers = {};
      options.headers['Authorization'] = 'Bearer ' + token;
      return fetch(url, options);
    }

    async function loadDashboardData() {
      try {
        // Stats
        const statRes = await fetchWithAuth('/api/admin/stats');
        if(statRes.ok) {
          const stats = await statRes.json();
          document.getElementById('stat-users').textContent = stats.users;
          document.getElementById('stat-apps').textContent = stats.appointments;
          document.getElementById('stat-reviews').textContent = stats.reviews;
        }

        // Appointments
        const appRes = await fetchWithAuth('/api/admin/appointments');
        if(appRes.ok) {
          const apps = await appRes.json();
          const tbody = document.getElementById('app-table-body');
          tbody.innerHTML = '';
          apps.forEach(app => {
            tbody.innerHTML += `
              <tr class="border-b border-gray-100">
                <td class="p-4 font-medium">${app.name}</td>
                <td class="p-4"><p>${app.email}</p><p class="text-xs text-gray-500">${app.phone || 'N/A'}</p></td>
                <td class="p-4"><p class="font-bold">${app.date}</p><p class="text-xs text-gray-500">${app.time}</p></td>
                <td class="p-4"><span class="bg-primary-teal/10 text-primary-teal px-2 py-1 rounded text-xs font-bold">${app.service}</span></td>
                <td class="p-4 text-sm text-gray-500">${app.message || '-'}</td>
              </tr>
            `;
          });
        }

        // Users
        const userRes = await fetchWithAuth('/api/admin/users');
        if(userRes.ok) {
          const users = await userRes.json();
          const tbody = document.getElementById('user-table-body');
          tbody.innerHTML = '';
          users.forEach(u => {
            tbody.innerHTML += `
              <tr class="border-b border-gray-100">
                <td class="p-4 text-gray-500">#${u.id}</td>
                <td class="p-4 font-bold flex items-center gap-3">
                  <img src="${u.dp || 'https://ui-avatars.com/api/?name='+u.name}" class="w-8 h-8 rounded-full border">
                  ${u.name}
                </td>
                <td class="p-4">${u.email}</td>
              </tr>
            `;
          });
        }

        // Documents
        const docRes = await fetchWithAuth('/api/admin/documents');
        if(docRes.ok) {
          const docs = await docRes.json();
          const tbody = document.getElementById('doc-table-body');
          tbody.innerHTML = '';
          docs.forEach(doc => {
            const date = new Date(doc.created_at).toLocaleDateString();
            tbody.innerHTML += `
              <tr class="border-b border-gray-100 hover:bg-gray-50">
                <td class="p-4 font-bold text-primary-teal"><a href="/${doc.filepath}" target="_blank" class="hover:underline flex items-center gap-2"><span class="material-symbols-outlined text-sm">description</span>${doc.filename}</a></td>
                <td class="p-4"><p>${doc.user_name}</p><p class="text-xs text-gray-500">${doc.user_email}</p></td>
                <td class="p-4">${date}</td>
                <td class="p-4 font-bold">${doc.status}</td>
                <td class="p-4">
                  <select onchange="updateDocStatus(${doc.id}, this.value)" class="border border-gray-300 rounded p-1 text-sm bg-gray-50 focus:outline-none">
                    <option value="" disabled selected>Change Status</option>
                    <option value="Uploaded">Uploaded</option>
                    <option value="Processing">Processing</option>
                    <option value="Completed">Completed</option>
                  </select>
                </td>
              </tr>
            `;
          });
        }
      } catch (e) {
        console.error("Dashboard error", e);
      }
    }

    async function submitBlog() {
      const title = document.getElementById('blog-title').value;
      const excerpt = document.getElementById('blog-excerpt').value;
      const content = document.getElementById('blog-content').value;
      const image = document.getElementById('blog-image').value;

      if(!title || !excerpt || !content) return alert("Title, excerpt, and content required.");

      try {
        const res = await fetchWithAuth('/api/admin/blogs', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({title, excerpt, content, image})
        });
        if(res.ok) {
          alert("Blog Published!");
          document.getElementById('blog-title').value = '';
          document.getElementById('blog-excerpt').value = '';
          document.getElementById('blog-content').value = '';
          document.getElementById('blog-image').value = '';
        } else {
          alert("Failed to publish");
        }
      } catch(e) {
        alert("Network error");
      }
    }

    async function updateDocStatus(docId, status) {
      if(!status) return;
      try {
        const res = await fetchWithAuth(`/api/admin/documents/${docId}/status`, {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({status})
        });
        if(res.ok) {
          loadDashboardData();
        } else {
          alert("Failed to update status");
        }
      } catch(e) {
        alert("Network error");
      }
    }
  </script>
</body>
</html>
