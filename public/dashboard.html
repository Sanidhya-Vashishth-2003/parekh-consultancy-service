<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | Parekh Consultancy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: #ffffff;
            --primary: #0d6e6e;
            --border-color: #e2e8f0;
        }
        .dark {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --primary: #2dd4bf;
            --border-color: #334155;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        .glass-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        /* Custom File Input */
        .file-upload-wrapper {
            position: relative;
            width: 100%;
            height: 150px;
            border: 2px dashed var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(13, 110, 110, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .file-upload-wrapper:hover {
            background: rgba(13, 110, 110, 0.1);
        }
        .file-upload-wrapper input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .status-Uploaded { background-color: #dbeafe; color: #1e40af; }
        .status-Processing { background-color: #fef08a; color: #854d0e; }
        .status-Completed { background-color: #dcfce3; color: #166534; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="glass-card sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight" style="color: var(--primary);">Parekh Portal</h1>
            <div class="flex items-center space-x-4">
                <span id="welcomeMessage" class="font-medium"></span>
                <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                    <i class="fas fa-moon text-xl" id="themeIcon"></i>
                </button>
                <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition shadow">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8 flex-grow">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Col: Upload -->
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card rounded-2xl p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-cloud-upload-alt text-teal-600"></i> Upload Document</h2>
                    <p class="text-sm opacity-80 mb-6">Securely upload your PAN, Form 16, or other tax documents.</p>
                    
                    <form id="uploadForm" class="space-y-4">
                        <div class="file-upload-wrapper">
                            <div class="text-center">
                                <i class="fas fa-file-pdf text-3xl mb-2" style="color: var(--primary);"></i>
                                <p class="font-medium" id="fileNameDisplay">Drag & Drop or Click to Browse</p>
                            </div>
                            <input type="file" id="documentFile" required accept=".pdf,.jpg,.jpeg,.png">
                        </div>
                        <button type="submit" class="w-full py-3 rounded-lg font-bold text-white transition shadow-lg" style="background-color: var(--primary);">
                            Secure Upload
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right Col: Document Status Tracker -->
            <div class="lg:col-span-2">
                <div class="glass-card rounded-2xl p-6 min-h-full">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><i class="fas fa-tasks text-teal-600"></i> Document Status Tracker</h2>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b" style="border-color: var(--border-color);">
                                    <th class="py-3 px-4 font-semibold uppercase text-sm tracking-wider opacity-80">Document</th>
                                    <th class="py-3 px-4 font-semibold uppercase text-sm tracking-wider opacity-80">Date</th>
                                    <th class="py-3 px-4 font-semibold uppercase text-sm tracking-wider opacity-80">Status</th>
                                </tr>
                            </thead>
                            <tbody id="documentsTableBody">
                                <!-- Dynamic Rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Authentication Check
        const token = localStorage.getItem('token');
        const userStr = localStorage.getItem('user');
        
        if (!token || !userStr) {
            window.location.href = '/'; // Redirect to home if not logged in
        }

        const user = JSON.parse(userStr);
        document.getElementById('welcomeMessage').innerText = \`Welcome, \${user.name.split(' ')[0]}\`;

        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
        }

        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('theme', 'light');
            }
        });

        // File Input Display
        document.getElementById('documentFile').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || "Drag & Drop or Click to Browse";
            document.getElementById('fileNameDisplay').innerText = fileName;
        });

        // Fetch Documents
        async function fetchDocuments() {
            try {
                const response = await fetch('/api/documents/my-documents', {
                    headers: { 'Authorization': \`Bearer \${token}\` }
                });
                if(response.ok) {
                    const docs = await response.json();
                    renderDocuments(docs);
                } else if(response.status === 401 || response.status === 403) {
                    logout();
                }
            } catch (err) {
                console.error("Error fetching documents:", err);
            }
        }

        function renderDocuments(docs) {
            const tbody = document.getElementById('documentsTableBody');
            tbody.innerHTML = '';
            
            if(docs.length === 0) {
                tbody.innerHTML = \`<tr><td colspan="3" class="text-center py-8 opacity-60">No documents uploaded yet.</td></tr>\`;
                return;
            }

            docs.forEach(doc => {
                const date = new Date(doc.created_at).toLocaleDateString();
                const row = document.createElement('tr');
                row.className = 'border-b transition hover:bg-black/5 dark:hover:bg-white/5';
                row.style.borderColor = 'var(--border-color)';
                row.innerHTML = \`
                    <td class="py-4 px-4 font-medium"><i class="fas fa-file-pdf mr-2 text-red-500"></i> <a href="/\${doc.filepath}" target="_blank" class="hover:underline">\${doc.filename}</a></td>
                    <td class="py-4 px-4 opacity-80">\${date}</td>
                    <td class="py-4 px-4"><span class="status-badge status-\${doc.status}">\${doc.status}</span></td>
                \`;
                tbody.appendChild(row);
            });
        }

        // Upload Document
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('documentFile');
            if(fileInput.files.length === 0) return alert("Please select a file.");

            const formData = new FormData();
            formData.append('document', fileInput.files[0]);

            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "Uploading...";
            btn.disabled = true;

            try {
                const response = await fetch('/api/documents/upload', {
                    method: 'POST',
                    headers: { 'Authorization': \`Bearer \${token}\` },
                    body: formData
                });
                
                if (response.ok) {
                    alert("Document uploaded securely!");
                    fileInput.value = "";
                    document.getElementById('fileNameDisplay').innerText = "Drag & Drop or Click to Browse";
                    fetchDocuments();
                } else {
                    alert("Upload failed.");
                }
            } catch (error) {
                console.error("Upload error", error);
                alert("An error occurred during upload.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        // Init
        fetchDocuments();
    </script>
</body>
</html>
